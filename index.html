<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>bromess</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: #0e1621;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 8px;
    }
    #app {
      max-width: 480px;
      width: 100%;
      height: 780px;
      background: #17212b;
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: all 0.2s;
    }
    @media (min-width: 720px) {
      #app {
        max-width: 820px;
        height: 820px;
        border-radius: 32px;
        flex-direction: row;
      }
    }
    @media (max-width: 480px) {
      #app {
        height: 100vh;
        max-height: 820px;
        border-radius: 0;
        box-shadow: none;
      }
      body {
        padding: 0;
      }
    }

    /* Left panel (chat) */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100%;
    }

    /* Right panel (contacts) */
    .contacts-panel {
      width: 0;
      overflow: hidden;
      background: #1e2a36;
      border-left: 1px solid #2b3a4a;
      transition: width 0.25s ease;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    @media (min-width: 720px) {
      .contacts-panel {
        width: 220px;
      }
    }
    .contacts-panel.open {
      width: 220px;
    }
    @media (max-width: 719px) {
      .contacts-panel.open {
        width: 100%;
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: 50;
        border-left: none;
        border-radius: 28px 0 0 28px;
        box-shadow: -8px 0 30px rgba(0,0,0,0.6);
      }
    }

    /* header */
    .header {
      background: #1e2a36;
      padding: 12px 16px 10px 16px;
      border-bottom: 1px solid #2b3a4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 8px;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .header-brand svg {
      width: 24px;
      height: 24px;
      fill: #6ab2f2;
    }
    .header-brand span {
      font-weight: 600;
      font-size: 18px;
      color: #e8edf0;
    }
    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .header-actions button {
      background: transparent;
      border: none;
      color: #8e9eab;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 10px;
      transition: 0.15s;
      display: flex;
      align-items: center;
    }
    .header-actions button:hover {
      background: #2b3a4a;
      color: #e8edf0;
    }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #2b3a4a;
      padding: 3px 10px 3px 6px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.15s;
    }
    .user-badge:hover {
      background: #384b5e;
    }
    .avatar-small {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #2b5278;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      font-size: 12px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar-small img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-name-small {
      color: #e8edf0;
      font-size: 13px;
      font-weight: 500;
      max-width: 70px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* contacts header */
    .contacts-header {
      padding: 12px 16px 8px 16px;
      border-bottom: 1px solid #2b3a4a;
      flex-shrink: 0;
    }
    .contacts-header input {
      width: 100%;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid #2b3a4a;
      background: #17212b;
      color: #e8edf0;
      font-size: 14px;
      outline: none;
    }
    .contacts-header input:focus {
      border-color: #2b5278;
    }
    .contacts-header input::placeholder {
      color: #6a7d8d;
    }
    .contacts-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }
    .contacts-list::-webkit-scrollbar {
      width: 4px;
    }
    .contacts-list::-webkit-scrollbar-thumb {
      background: #384b5e;
      border-radius: 10px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 14px;
      color: #b0c4d3;
      font-size: 14px;
      transition: 0.1s;
      cursor: default;
    }
    .contact-item:hover {
      background: #2b3a4a;
    }
    .contact-item .avatar-small {
      width: 30px;
      height: 30px;
      font-size: 14px;
    }
    .contact-item .contact-name {
      font-weight: 500;
      color: #e8edf0;
    }
    .contact-item .contact-login {
      font-size: 12px;
      color: #6a7d8d;
      margin-left: 4px;
    }
    .contact-empty {
      color: #6a7d8d;
      font-size: 13px;
      text-align: center;
      padding: 30px 10px;
    }

    /* messages */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px 6px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #17212b;
      scroll-behavior: smooth;
    }
    .messages-container::-webkit-scrollbar {
      width: 4px;
    }
    .messages-container::-webkit-scrollbar-track {
      background: #1e2a36;
    }
    .messages-container::-webkit-scrollbar-thumb {
      background: #384b5e;
      border-radius: 10px;
    }
    .msg {
      max-width: 82%;
      padding: 8px 14px;
      border-radius: 16px;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.4;
      background: #1e2a36;
      color: #e8edf0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      position: relative;
    }
    .msg.out {
      align-self: flex-end;
      background: #2b5278;
      border-bottom-right-radius: 4px;
      border-bottom-left-radius: 16px;
      color: #f0f4f7;
    }
    .msg .time {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 3px;
      display: block;
      text-align: right;
      color: #b0c4d3;
    }
    .msg.out .time {
      color: #b3d0e8;
    }
    .msg .file-attachment {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      padding: 6px 12px 6px 8px;
      border-radius: 12px;
      margin: 4px 0 2px 0;
      cursor: pointer;
      transition: 0.1s;
    }
    .msg .file-attachment:hover {
      background: rgba(255,255,255,0.12);
    }
    .msg .file-attachment .file-icon {
      font-size: 22px;
    }
    .msg .file-attachment .file-name {
      font-size: 13px;
      word-break: break-all;
      color: #b0c4d3;
    }
    .msg img.msg-image {
      max-width: 100%;
      border-radius: 12px;
      margin: 4px 0 2px 0;
      max-height: 260px;
      object-fit: contain;
      background: #0e1621;
      cursor: pointer;
    }
    .empty-state {
      text-align: center;
      color: #6a7d8d;
      font-size: 14px;
      padding: 30px 16px;
      user-select: none;
      background: #17212b;
      border-radius: 20px;
      margin: auto 0;
    }

    /* input area */
    .input-area {
      background: #1e2a36;
      padding: 8px 12px 12px 12px;
      border-top: 1px solid #2b3a4a;
      display: flex;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .input-row {
      display: flex;
      flex: 1;
      gap: 6px;
      align-items: flex-end;
      min-width: 0;
    }
    .input-area textarea {
      flex: 1;
      background: #2b3a4a;
      border: none;
      border-radius: 20px;
      padding: 10px 14px;
      color: #e8edf0;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 38px;
      max-height: 100px;
      line-height: 1.4;
      font-family: inherit;
      min-width: 0;
    }
    .input-area textarea::placeholder {
      color: #7a8b9c;
    }
    .input-area textarea:focus {
      background: #31465a;
    }
    .input-area .btn-icon {
      background: #2b5278;
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: 0.2s;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .input-area .btn-icon:hover {
      background: #3b6b94;
      transform: scale(0.95);
    }
    .input-area .btn-icon:active {
      transform: scale(0.9);
    }
    .input-area .btn-secondary {
      background: #2b3a4a;
      font-size: 18px;
    }
    .input-area .btn-secondary:hover {
      background: #384b5e;
    }
    .file-input-hidden {
      display: none;
    }
    .footer-note {
      background: #0e1621;
      color: #4b5f6f;
      font-size: 10px;
      text-align: center;
      padding: 4px 0 3px 0;
      border-top: 1px solid #1e2a36;
      letter-spacing: 0.2px;
    }

    /* modals */
    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      border-radius: inherit;
    }
    .modal-card {
      background: #1e2a36;
      border-radius: 24px;
      padding: 24px 20px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.8);
      border: 1px solid #2b3a4a;
    }
    .modal-card h2 {
      color: #e8edf0;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }
    .modal-card label {
      color: #b0c4d3;
      font-size: 13px;
      font-weight: 500;
      display: block;
      margin: 10px 0 4px 0;
    }
    .modal-card input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 16px;
      border: 1px solid #2b3a4a;
      background: #17212b;
      color: #e8edf0;
      font-size: 14px;
      outline: none;
      transition: 0.15s;
    }
    .modal-card input:focus {
      border-color: #2b5278;
      background: #1e2a36;
    }
    .modal-card .avatar-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .modal-card .avatar-input-row input {
      flex: 1;
    }
    .modal-card .avatar-preview {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #2b5278;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
      font-weight: 600;
      flex-shrink: 0;
      overflow: hidden;
    }
    .modal-card .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .modal-actions button {
      padding: 8px 18px;
      border-radius: 30px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      background: #2b3a4a;
      color: #b0c4d3;
    }
    .modal-actions button.primary {
      background: #2b5278;
      color: white;
    }
    .modal-actions button.primary:hover {
      background: #3b6b94;
    }
    .modal-actions button:hover {
      background: #384b5e;
      color: #e8edf0;
    }
    .modal-actions button.danger {
      background: #5c2b2b;
      color: #f0b3b3;
    }
    .modal-actions button.danger:hover {
      background: #7a3a3a;
    }
    .modal-error {
      color: #f28b82;
      font-size: 12px;
      margin: 4px 0 0 0;
      text-align: center;
    }
    .hidden {
      display: none !important;
    }
    .contacts-toggle {
      display: none;
    }
    @media (max-width: 719px) {
      .contacts-toggle {
        display: flex;
      }
    }
    @media (min-width: 720px) {
      .contacts-toggle {
        display: none;
      }
    }

    /* image preview */
    .image-preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
      cursor: pointer;
    }
    .image-preview-overlay img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
      object-fit: contain;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Chat panel -->
  <div class="chat-panel">
    <!-- Header -->
    <div class="header">
      <div class="header-brand" id="profileTrigger">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M20 2H4C2.9 2 2 2.9 2 4V20C2 21.1 2.9 22 4 22H20C21.1 22 22 21.1 22 20V4C22 2.9 21.1 2 20 2ZM8 18H6V10H8V18ZM13 18H11V6H13V18ZM18 18H16V14H18V18Z"/>
        </svg>
        <span>bromess</span>
      </div>
      <div class="header-actions">
        <button class="contacts-toggle" id="toggleContactsBtn" aria-label="Контакты">👥</button>
        <div class="user-badge" id="profileBadge">
          <div class="avatar-small" id="headerAvatar">B</div>
          <span class="user-name-small" id="headerName">User</span>
        </div>
        <button id="clearBtn" aria-label="Очистить">🗑️</button>
      </div>
    </div>

    <!-- Messages -->
    <div id="messagesList" class="messages-container"></div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <button class="btn-icon btn-secondary" id="fileBtn" aria-label="Файл">📎</button>
        <button class="btn-icon btn-secondary" id="imageBtn" aria-label="Фото">🖼️</button>
        <textarea id="msgInput" rows="1" placeholder="Сообщение..." autofocus></textarea>
        <button class="btn-icon" id="sendBtn" aria-label="Отправить">➤</button>
      </div>
      <input type="file" id="fileInput" class="file-input-hidden" multiple>
      <input type="file" id="imageInput" class="file-input-hidden" accept="image/*" multiple>
    </div>
    <div class="footer-note">сохранено в bromess.md</div>
  </div>

  <!-- Contacts panel -->
  <div class="contacts-panel" id="contactsPanel">
    <div class="contacts-header">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="color:#e8edf0;font-weight:600;font-size:15px;">Контакты</span>
        <button id="closeContactsBtn" class="contacts-toggle" style="background:transparent;border:none;color:#8e9eab;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <input id="contactSearchInput" type="text" placeholder="Поиск по логину или имени...">
    </div>
    <div class="contacts-list" id="contactsListContainer"></div>
  </div>

  <!-- Login Modal -->
  <div id="loginModal" class="modal-overlay">
    <div class="modal-card">
      <h2>Вход в bromess</h2>
      <label>Логин</label>
      <input id="loginInput" type="text" placeholder="Введите логин" value="alex">
      <div id="loginError" class="modal-error"></div>
      <div class="modal-actions">
        <button id="loginBtn" class="primary">Войти</button>
      </div>
      <div style="margin-top:10px;color:#6a7d8d;font-size:12px;text-align:center;">Если логин занят — вход запрещён</div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profileModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2>Профиль</h2>
      <label>Имя</label>
      <input id="profileNameInput" type="text" placeholder="Ваше имя">
      <label>Аватар (URL или эмодзи / буква)</label>
      <div class="avatar-input-row">
        <input id="profileAvatarInput" type="text" placeholder="https://... или emoji">
        <div class="avatar-preview" id="profileAvatarPreview">👤</div>
      </div>
      <div class="modal-actions">
        <button id="saveProfileBtn" class="primary">Сохранить</button>
        <button id="closeProfileBtn">Закрыть</button>
        <button id="logoutBtn" class="danger">Выйти</button>
      </div>
    </div>
  </div>

  <!-- Image preview -->
  <div id="imagePreviewOverlay" class="image-preview-overlay hidden">
    <img id="previewImage" src="" alt="preview">
  </div>
</div>

<script>
  (function() {
    // === Data ===
    const STORAGE_KEY = 'bromess_data';

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') return parsed;
        }
      } catch (e) {}
      return { users: {}, messages: [], currentUser: null };
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    let data = loadData();
    let currentUser = data.currentUser || null;
    let messages = data.messages || [];

    // === DOM ===
    const messagesContainer = document.getElementById('messagesList');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const fileBtn = document.getElementById('fileBtn');
    const imageBtn = document.getElementById('imageBtn');
    const fileInput = document.getElementById('fileInput');
    const imageInput = document.getElementById('imageInput');

    const loginModal = document.getElementById('loginModal');
    const loginInput = document.getElementById('loginInput');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    const profileModal = document.getElementById('profileModal');
    const profileNameInput = document.getElementById('profileNameInput');
    const profileAvatarInput = document.getElementById('profileAvatarInput');
    const profileAvatarPreview = document.getElementById('profileAvatarPreview');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    const closeProfileBtn = document.getElementById('closeProfileBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const profileTrigger = document.getElementById('profileTrigger');
    const profileBadge = document.getElementById('profileBadge');
    const headerAvatar = document.getElementById('headerAvatar');
    const headerName = document.getElementById('headerName');

    const contactsPanel = document.getElementById('contactsPanel');
    const contactsListContainer = document.getElementById('contactsListContainer');
    const contactSearchInput = document.getElementById('contactSearchInput');
    const toggleContactsBtn = document.getElementById('toggleContactsBtn');
    const closeContactsBtn = document.getElementById('closeContactsBtn');

    const imagePreviewOverlay = document.getElementById('imagePreviewOverlay');
    const previewImage = document.getElementById('previewImage');

    // === helpers ===
    function getUser(login) {
      return data.users[login] || null;
    }

    function getCurrentUser() {
      if (!currentUser) return null;
      return getUser(currentUser);
    }

    function saveAndSync() {
      data.messages = messages;
      data.currentUser = currentUser;
      saveData(data);
      renderAll();
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    // === render ===
    function renderMessages() {
      if (!messagesContainer) return;
      if (messages.length === 0) {
        messagesContainer.innerHTML = `<div class="empty-state">✨ Нет сообщений. Напишите что-нибудь...</div>`;
        return;
      }
      let html = '';
      for (let i = 0; i < messages.length; i++) {
        const m = messages[i];
        const isOut = m.out === true;
        const cls = isOut ? 'msg out' : 'msg';
        let content = '';
        if (m.type === 'file' && m.fileName) {
          const icon = m.fileType && m.fileType.startsWith('image/') ? '🖼️' : '📄';
          content += `<div class="file-attachment" data-file="${escapeHtml(m.fileData || '')}" data-name="${escapeHtml(m.fileName)}">
            <span class="file-icon">${icon}</span>
            <span class="file-name">${escapeHtml(m.fileName)}</span>
          </div>`;
        } else if (m.type === 'image' && m.fileData) {
          content += `<img class="msg-image" src="${escapeHtml(m.fileData)}" alt="image" loading="lazy" data-src="${escapeHtml(m.fileData)}">`;
        } else {
          content += escapeHtml(m.text || '');
        }
        const time = m.time || formatTime(m.timestamp || Date.now());
        html += `<div class="${cls}">${content}<span class="time">${escapeHtml(time)}</span></div>`;
      }
      messagesContainer.innerHTML = html;
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      // click on image to preview
      document.querySelectorAll('.msg-image').forEach(img => {
        img.addEventListener('click', function(e) {
          e.stopPropagation();
          const src = this.getAttribute('data-src') || this.src;
          if (src) {
            previewImage.src = src;
            imagePreviewOverlay.classList.remove('hidden');
          }
        });
      });
      // click on file to download
      document.querySelectorAll('.file-attachment').forEach(el => {
        el.addEventListener('click', function() {
          const data = this.getAttribute('data-file');
          const name = this.getAttribute('data-name') || 'file';
          if (data) {
            const link = document.createElement('a');
            link.href = data;
            link.download = name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          }
        });
      });
    }

    function updateHeader() {
      const user = getCurrentUser();
      if (user) {
        const name = user.name || currentUser || 'User';
        const avatar = user.avatar || name.charAt(0).toUpperCase();
        headerName.textContent = name;
        if (avatar && (avatar.startsWith('http') || avatar.startsWith('data:'))) {
          headerAvatar.innerHTML = `<img src="${escapeHtml(avatar)}" alt="avatar">`;
        } else {
          headerAvatar.innerHTML = escapeHtml(avatar);
          headerAvatar.style.background = '#2b5278';
        }
      } else {
        headerName.textContent = 'Гость';
        headerAvatar.innerHTML = '?';
      }
    }

    function renderContacts(filter = '') {
      const user = getCurrentUser();
      if (!user) {
        contactsListContainer.innerHTML = '<div class="contact-empty">Войдите для просмотра</div>';
        return;
      }
      const contacts = user.contacts || [];
      if (contacts.length === 0) {
        contactsListContainer.innerHTML = '<div class="contact-empty">Нет контактов. Добавьте в профиле.</div>';
        return;
      }
      let html = '';
      const flt = filter.toLowerCase().trim();
      contacts.forEach(login => {
        const u = getUser(login);
        if (!u) return;
        const name = u.name || login;
        const av = u.avatar || name.charAt(0).toUpperCase();
        const match = name.toLowerCase().includes(flt) || login.toLowerCase().includes(flt);
        if (flt && !match) return;
        let avHtml = '';
        if (av && (av.startsWith('http') || av.startsWith('data:'))) {
          avHtml = `<img src="${escapeHtml(av)}" alt="avatar">`;
        } else {
          avHtml = escapeHtml(av);
        }
        html += `<div class="contact-item">
          <div class="avatar-small">${avHtml}</div>
          <div><span class="contact-name">${escapeHtml(name)}</span><span class="contact-login">@${escapeHtml(login)}</span></div>
        </div>`;
      });
      if (!html) html = '<div class="contact-empty">Ничего не найдено</div>';
      contactsListContainer.innerHTML = html;
    }

    function renderAll() {
      renderMessages();
      updateHeader();
      renderContacts(contactSearchInput.value);
      // profile fields
      const user = getCurrentUser();
      if (user) {
        profileNameInput.value = user.name || '';
        profileAvatarInput.value = user.avatar || '';
        updateAvatarPreview(user.avatar || user.name || '👤');
      }
    }

    function updateAvatarPreview(val) {
      if (val && (val.startsWith('http') || val.startsWith('data:'))) {
        profileAvatarPreview.innerHTML = `<img src="${escapeHtml(val)}" alt="avatar">`;
      } else {
        profileAvatarPreview.innerHTML = escapeHtml(val || '👤');
        profileAvatarPreview.style.background = '#2b5278';
      }
    }

    // === add message with attachments ===
    function addMessage(text, out = true, type = 'text', fileData = null, fileName = null, fileType = null) {
      const now = new Date();
      const msg = {
        text: text || '',
        time: formatTime(now),
        out: out,
        timestamp: now.getTime(),
        type: type || 'text'
      };
      if (type === 'file' && fileData) {
        msg.fileData = fileData;
        msg.fileName = fileName || 'file';
        msg.fileType = fileType || '';
      }
      if (type === 'image' && fileData) {
        msg.fileData = fileData;
        msg.fileName = fileName || 'image';
        msg.fileType = fileType || 'image/*';
      }
      messages.push(msg);
      saveAndSync();
      return true;
    }

    function handleFiles(files, type) {
      if (!currentUser) { alert('Сначала войдите'); return; }
      if (!files || files.length === 0) return;
      for (let f of files) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const dataUrl = e.target.result;
          if (type === 'image') {
            addMessage('', true, 'image', dataUrl, f.name, f.type);
          } else {
            addMessage('', true, 'file', dataUrl, f.name, f.type);
          }
        };
        reader.readAsDataURL(f);
      }
    }

    // === login ===
    function attemptLogin() {
      const login = loginInput.value.trim();
      if (!login) { loginError.textContent = 'Введите логин'; return; }
      if (data.users[login]) {
        loginError.textContent = '❌ Логин занят. Войдите под другим.';
        return;
      }
      data.users[login] = { name: login, avatar: login.charAt(0).toUpperCase(), contacts: [] };
      currentUser = login;
      messages = data.messages || [];
      saveAndSync();
      loginModal.classList.add('hidden');
      loginError.textContent = '';
      msgInput.focus();
    }

    // === profile ===
    function saveProfile() {
      const user = getCurrentUser();
      if (!user) return;
      const newName = profileNameInput.value.trim() || currentUser;
      const newAvatar = profileAvatarInput.value.trim() || newName.charAt(0).toUpperCase();
      user.name = newName;
      user.avatar = newAvatar;
      data.users[currentUser] = user;
      saveAndSync();
      profileModal.classList.add('hidden');
      renderAll();
    }

    function logout() {
      if (confirm('Выйти из аккаунта?')) {
        currentUser = null;
        data.currentUser = null;
        saveData(data);
        loginModal.classList.remove('hidden');
        profileModal.classList.add('hidden');
        renderAll();
        loginInput.value = '';
        loginError.textContent = '';
      }
    }

    // === clear ===
    function clearMessages() {
      if (messages.length === 0) return;
      if (confirm('Очистить всю историю?')) {
        messages = [];
        saveAndSync();
        msgInput.focus();
      }
    }

    // === init ===
    function init() {
      if (!currentUser || !data.users[currentUser]) {
        loginModal.classList.remove('hidden');
        currentUser = null;
        data.currentUser = null;
        saveData(data);
      } else {
        loginModal.classList.add('hidden');
      }

      renderAll();

      // send
      sendBtn.addEventListener('click', () => {
        if (!currentUser) { alert('Сначала войдите'); return; }
        const text = msgInput.value;
        if (text.trim()) {
          addMessage(text, true);
          msgInput.value = '';
          msgInput.style.height = 'auto';
          msgInput.focus();
        }
      });

      msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendBtn.click();
        }
      });

      msgInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
      });

      // file buttons
      fileBtn.addEventListener('click', () => fileInput.click());
      imageBtn.addEventListener('click', () => imageInput.click());

      fileInput.addEventListener('change', function(e) {
        handleFiles(this.files, 'file');
        this.value = '';
      });
      imageInput.addEventListener('change', function(e) {
        handleFiles(this.files, 'image');
        this.value = '';
      });

      clearBtn.addEventListener('click', clearMessages);

      loginBtn.addEventListener('click', attemptLogin);
      loginInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });

      profileBadge.addEventListener('click', () => {
        if (!currentUser) { alert('Войдите сначала'); return; }
        profileModal.classList.remove('hidden');
        renderAll();
      });

      profileTrigger.addEventListener('click', () => {
        if (!currentUser) { loginModal.classList.remove('hidden'); return; }
        profileModal.classList.remove('hidden');
        renderAll();
      });

      closeProfileBtn.addEventListener('click', () => profileModal.classList.add('hidden'));
      saveProfileBtn.addEventListener('click', saveProfile);
      logoutBtn.addEventListener('click', logout);

      profileAvatarInput.addEventListener('input', function() {
        updateAvatarPreview(this.value);
      });

      // contacts toggle
      toggleContactsBtn.addEventListener('click', () => {
        contactsPanel.classList.toggle('open');
        if (contactsPanel.classList.contains('open')) {
          renderContacts(contactSearchInput.value);
        }
      });
      closeContactsBtn.addEventListener('click', () => {
        contactsPanel.classList.remove('open');
      });

      contactSearchInput.addEventListener('input', function() {
        renderContacts(this.value);
      });

      // image preview close
      imagePreviewOverlay.addEventListener('click', function() {
        this.classList.add('hidden');
        previewImage.src = '';
      });

      // если нет сообщений, приветственные
      if (messages.length === 0 && currentUser) {
        messages.push({ text: 'Добро пожаловать в bromess!', time: '12:00', out: false, timestamp: Date.now() - 60000 });
        messages.push({ text: 'Можно отправлять фото и файлы', time: '12:01', out: false, timestamp: Date.now() - 30000 });
        messages.push({ text: 'Привет!', time: '12:02', out: true, timestamp: Date.now() });
        saveAndSync();
      }
    }

    init();
  })();
</script>
</body>
</html>
